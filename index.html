<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <style>
        /* Modern Font Import */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.125);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-primary);
        }

        /* Animated Gradient Background */
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(56, 189, 248, 0) 70%);
            top: -100px;
            left: -100px;
            z-index: -1;
            filter: blur(50px);
        }

        body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(139, 92, 246, 0) 70%);
            bottom: -150px;
            right: -150px;
            z-index: -1;
            filter: blur(60px);
        }

        /* Business Card Container */
        .card {
            position: relative;
            width: 380px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            overflow: hidden;
        }

        /* Glow effect on hover */
        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        /* Profile Image Slot */
        .profile-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 24px;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            border: 3px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .card:hover .profile-image {
            transform: scale(1.05);
            border-color: var(--accent-color);
        }

        /* Text Styles */
        .name {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        .bio {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.5;
            font-weight: 300;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--glass-border);
            padding-top: 24px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .contact-item:hover {
            color: var(--accent-color);
        }

        .email-icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* Tag Label */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Digital Identity</div>
        
        <div class="profile-container">
            <!-- Replace 'src' with your image URL -->
            <div class="profile-image">
                <img src="./프로필.png" alt="Profile Image">
            </div>
        </div>

        <h1 class="name">박한결</h1>
        <p class="bio">창의적인 아이디어를 코드로 실현하는<br>프론트엔드 개발자입니다.</p>

        <div class="contact-info">
            <a href="mailto:yourname@example.com" class="contact-item">
                <svg class="email-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                yourname@example.com
            </a>
        </div>
    </div>

</body>
</html>
